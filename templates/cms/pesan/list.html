{% extends 'cms/generic_list.html' %}

{% block table_rows %}
{% for item in items %}
<tr class="hover:bg-gray-50/50 transition-colors">
    <td class="px-6 py-4">
        <p class="font-bold text-gray-900 leading-tight">{{ item.nama }}</p>
        <p class="text-xs text-gray-400 font-medium">{{ item.email }}</p>
    </td>
    <td class="px-6 py-4 text-sm text-gray-600">
        <div class="max-w-md truncate" title="{{ item.pesan }}">
            {{ item.pesan }}
        </div>
    </td>
    <td class="px-6 py-4 text-xs text-gray-500">
        {{ item.tanggal|date:"d M Y, H:i" }}
    </td>
    <td class="px-6 py-4 text-right">
        <div class="flex justify-end gap-2">
            <a href="{% url 'cms_delete_pesan' item.pk %}" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-all shadow-sm" title="Hapus" onclick="return confirm('Hapus pesan dari {{ item.nama }}?')">
                <i class="fas fa-trash text-xs"></i>
            </a>
        </div>
    </td>
</tr>
{% endfor %}
{% endblock %}
