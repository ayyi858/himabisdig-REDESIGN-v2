<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CMS | HIMABISDIG UNM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-primary-600 p-8 text-white text-center">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                    <i class="fas fa-lock text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold">HIMACMS Login</h2>
                <p class="text-primary-100 mt-1">Silakan login untuk mengelola konten</p>
            </div>
            
            <form action="{% url 'cms_login' %}" method="POST" class="p-8 space-y-6">
                {% csrf_token %}
                
                {% if messages %}
                <div class="space-y-2">
                    {% for message in messages %}
                    <div class="p-3 text-sm rounded-lg bg-red-50 text-red-700 border border-red-100 flex items-center gap-2">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="username" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm" placeholder="Masukkan username">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-key text-gray-400"></i>
                        </div>
                        <input type="password" name="password" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500 text-sm" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary-600 text-white font-bold py-2.5 rounded-lg hover:bg-primary-700 transition shadow-lg shadow-primary-500/30 flex items-center justify-center gap-2">
                    Login ke Dashboard <i class="fas fa-arrow-right text-xs"></i>
                </button>
                
                <div class="text-center">
                    <a href="/" class="text-xs text-gray-400 hover:text-primary-600 transition">Kembali ke Beranda Website</a>
                </div>
            </form>
        </div>
        <p class="text-center mt-8 text-gray-400 text-sm">&copy; 2026 HIMABISDIG UNM</p>
    </div>
</body>
</html>
