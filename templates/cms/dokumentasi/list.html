{% extends 'cms/generic_list.html' %}

{% block table_rows %}
{% for item in items %}
<tr class="hover:bg-gray-50/50 transition-colors">
    <td class="px-6 py-4">
        {% if item.foto %}
            <img src="{{ item.foto.url }}" class="w-24 h-16 rounded-xl object-cover shadow-sm ring-1 ring-gray-100" alt="">
        {% endif %}
    </td>
    <td class="px-6 py-4">
        <p class="font-bold text-gray-900 leading-tight">{{ item.kegiatan.judul|default:"Umum" }}</p>
        <p class="text-xs text-primary-500 font-medium mt-1">{{ item.get_ekosistem_display }}</p>
    </td>
    <td class="px-6 py-4 text-sm text-gray-500 truncate max-w-xs" title="{{ item.deskripsi }}">
        {{ item.deskripsi|default:"-" }}
    </td>
    <td class="px-6 py-4 text-right">
        <div class="flex justify-end gap-2">
            <a href="{% url 'cms_edit_dokumentasi' item.pk %}" class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-all shadow-sm" title="Edit">
                <i class="fas fa-edit text-xs"></i>
            </a>
            <a href="{% url 'cms_delete_dokumentasi' item.pk %}" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-all shadow-sm" title="Hapus" onclick="return confirm('Hapus dokumentasi ini?')">
                <i class="fas fa-trash text-xs"></i>
            </a>
        </div>
    </td>
</tr>
{% endfor %}
{% endblock %}
