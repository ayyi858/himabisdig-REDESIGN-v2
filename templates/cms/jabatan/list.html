{% extends 'cms/generic_list.html' %}

{% block table_rows %}
{% for item in items %}
<tr class="hover:bg-gray-50/50 transition-colors">
    <td class="px-6 py-4 font-medium text-gray-900 border-l-4 border-transparent hover:border-primary-500">{{ item.id }}</td>
    <td class="px-6 py-4 text-gray-700 font-semibold">{{ item.nama }}</td>
    <td class="px-6 py-4 text-right">
        <div class="flex justify-end gap-2">
            <a href="{% url 'cms_edit_jabatan' item.pk %}" class="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-all shadow-sm" title="Edit">
                <i class="fas fa-edit text-xs"></i>
            </a>
            <a href="{% url 'cms_delete_jabatan' item.pk %}" class="w-8 h-8 flex items-center justify-center bg-red-50 text-red-600 rounded-lg hover:bg-red-600 hover:text-white transition-all shadow-sm" title="Hapus" onclick="return confirm('Apakah Anda yakin ingin menghapus jabatan ini?')">
                <i class="fas fa-trash text-xs"></i>
            </a>
        </div>
    </td>
</tr>
{% endfor %}
{% endblock %}

{% block extra_js %}
<script>
    // Inisialisasi tambahan jika perlu
</script>
{% endblock %}
